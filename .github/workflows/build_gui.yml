name: Build GUI

on: push

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
    - uses: actions/checkout@v6

    - name: Setup Dotnet
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'

    - name: Build GUI
      run: |
        cd ScuNetAutoLogin
        dotnet publish ./Sal.GUI -c Release -o ../publish

    - name: Remove debug symbols (Windows)
      if: true && matrix.os == 'windows-latest'
      run: |
        cd publish
        del *.pdb

    - name: Remove debug symbols (Linux/Mac)
      if: true && (matrix.os == 'ubuntu-latest' || matrix.os == 'macos-latest')
      run: |
        cd publish
        find . -name "*.pdb" -type f -delete
        find . -name "*.dbg" -type f -delete

    - name: Setup 7-Zip
      uses: milliewalky/setup-7-zip@v2

    - name: Archive GUI
      run: |
        cd publish
        7z a -tzip ../Sal.GUI-${{ matrix.os }}.zip *

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: Sal.GUI-${{ matrix.os }}.zip
        path: Sal.GUI-${{ matrix.os }}.zip
        archive: false

    - name: Release GUI
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v3
      with:
        files: Sal.GUI-${{ matrix.os }}.zip
